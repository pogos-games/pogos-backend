name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag to push (e.g., v1.0.0)"
        required: true
        default: "latest"

env:
  REGISTRY: ghcr.io
  IMAGE_CORE: ghcr.io/${{ github.repository }}/pogos-core
  IMAGE_GAMES: ghcr.io/${{ github.repository }}/pogos-games

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Build & push pogos-core
      - name: Build and push pogos-core Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile_core
          tags: |
            ${{ env.IMAGE_CORE }}:${{ github.event.inputs.tag }}
            ${{ env.IMAGE_CORE }}:${{ github.sha }}
          push: true
          build-args: |
            APP_NAME=pogos-core

      # Build & push pogos-games
      - name: Build and push pogos-games Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile_games
          tags: |
            ${{ env.IMAGE_GAMES }}:${{ github.event.inputs.tag }}
            ${{ env.IMAGE_GAMES }}:${{ github.sha }}
          push: true
          build-args: |
            APP_NAME=pogos-games
